    <style>
        :root {
            /* UNIFIED BACKGROUND COLOR TO PREVENT SHADE MISMATCH */
            --bg-sky: #fae0e4;
            --bg-cream: #fae0e4;
            --pastel-pink-dark: #fae0e4;
            --text-dark: #2c2525;
            --accent-maroon: #6b2d5c;
            --gold-muted: #d4a373;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-sky); font-family: 'Montserrat', sans-serif; overflow-x: hidden; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

        .lang-container {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: #ffffff; padding: 8px 16px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            display: flex; gap: 10px; font-size: 0.8rem; font-weight: 600;
            border: 1px solid var(--accent-maroon); align-items: center;
        }
        .lang-btn {
            color: #665555; text-decoration: none; transition: color 0.3s, transform 0.2s;
            font-family: inherit; font-size: inherit; padding: 2px 4px; -webkit-tap-highlight-color: transparent;
        }
        .lang-btn:hover, .lang-btn.active { color: var(--accent-maroon); transform: scale(1.05); }
        .lang-divider { color: #e0d0d0; font-weight: 300; }

        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-sky); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            overflow: hidden; opacity: 1; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.4s ease;
        }

        .flight-container { 
            position: relative; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            z-index: 1005; -webkit-tap-highlight-color: transparent; padding: 20px;
            width: 100%; max-width: 350px;
        }
        .airplane-svg { width: 140px; height: auto; fill: var(--accent-maroon); filter: drop-shadow(0 10px 15px rgba(107,45,92,0.15)); margin-bottom: 25px; transition: transform 1.8s cubic-bezier(0.45, 0, 0.55, 1); }
        
        .takeoff-banner {
            background: white; padding: 12px 28px; border-radius: 50px;
            font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; color: var(--accent-maroon);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); white-space: nowrap; border: 1px solid rgba(107,45,92,0.1);
            text-align: center; width: 100%; transition: opacity 0.3s ease;
        }

        .reveal-banner {
            position: absolute; top: -25px; background: white; padding: 10px 30px; border: 2.5px dashed var(--accent-maroon);
            font-family: 'Alex Brush', cursive; font-size: 2.3rem; font-weight: bold; color: var(--accent-maroon);
            white-space: nowrap; opacity: 0; transform: scale(0.5); transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease; z-index: 1006;
            box-shadow: 0 8px 20px rgba(107,45,92,0.15);
        }

        .launch-text { color: #8a7578; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px; margin-top: 25px; text-align: center; transition: opacity 0.3s ease; }

        .flight-container.takeoff .takeoff-banner, .flight-container.takeoff .launch-text { opacity: 0; }
        .flight-container.takeoff .reveal-banner { opacity: 1; transform: scale(1); }
        .flight-container.takeoff .airplane-svg { animation: delayedFlyAway 1.8s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards; }
