<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Charvi & Yash Wedding 🎉</title>
    
    <meta property="og:title" content=" Wedding of Charvi & Yash" />
    <meta property="og:description" content="We are taking off! Tap to watch our airplane takeoff and RSVP to confirm your presence. ✈️💍" />
    <meta property="og:image" content="https://yashrajput14394-cpu.github.io/CharviSaidYash/wedding_bg_mobile.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yashrajput14394-cpu.github.io/CharviSaidYash/" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-sky: #fae0e4;
            --bg-cream: #fae0e4;
            --text-dark: #2c2525;
            --accent-maroon: #6b2d5c;
            --gold-muted: #d4a373;
            --pastel-pink-dark: #f7cad0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-sky); font-family: 'Montserrat', sans-serif; overflow-x: hidden; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

        /* --- FIXED LANGUAGE SWITCHER --- */
        .lang-container {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: #ffffff; padding: 8px 16px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            display: flex; gap: 10px; font-size: 0.8rem; font-weight: 600;
            border: 1px solid var(--accent-maroon); align-items: center;
        }
        .lang-btn {
            color: #665555; cursor: pointer; transition: color 0.3s, transform 0.2s;
            background: none; border: none; font-family: inherit; font-size: inherit; outline: none;
            padding: 2px 4px; -webkit-tap-highlight-color: transparent;
        }
        .lang-btn:hover, .lang-btn.active { color: var(--accent-maroon); transform: scale(1.05); }
        .lang-divider { color: #e0d0d0; font-weight: 300; }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-sky); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.5s ease, transform 0.8s cubic-bezier(0.7, 0, 0.3, 1); overflow: hidden;
            opacity: 1;
        }

        .cloud { position: absolute; background: rgba(255, 255, 255, 0.75); border-radius: 100px; animation: floatClouds 20s linear infinite; z-index: 1; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.75); border-radius: 50%; }
        .c1 { width: 120px; height: 40px; top: 20%; left: -150px; animation-duration: 25s; }
        .c2 { width: 180px; height: 60px; top: 60%; left: -200px; animation-duration: 18s; animation-delay: 5s; }
        @keyframes floatClouds { 0% { left: -200px; } 100% { left: 100vw; } }

        .flight-container { position: relative; width: 100%; max-width: 400px; height: 200px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5; -webkit-tap-highlight-color: transparent; }
        .airplane-svg { width: 180px; height: auto; fill: var(--accent-maroon); filter: drop-shadow(0 10px 15px rgba(107,45,92,0.15)); }
        
        .takeoff-banner {
            position: absolute; bottom: 10px; background: white; padding: 8px 20px; border-radius: 50px;
            font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.9rem; color: var(--accent-maroon);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); white-space: nowrap; border: 1px solid rgba(107,45,92,0.1);
        }

        .reveal-banner {
            position: absolute; right: 50%; transform: translateX(50%) scaleX(0); top: 30%; background: white; padding: 8px 25px; border: 2px dashed var(--accent-maroon);
            font-family: 'Alex Brush', cursive; font-size: 1.8rem; color: var(--accent-maroon);
            white-space: nowrap; opacity: 0; transform-origin: center; transition: transform 0.8s ease, opacity 0.5s ease; z-index: 6;
        }

        .launch-text { color: #8a7578; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px; margin-top: 20px; animation: pulse 1.5s infinite; z-index: 5; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        .flight-container.takeoff { animation: flyAwayOut 2s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards; }
        .flight-container.takeoff .takeoff-banner { opacity: 0; }
        .flight-container.takeoff .reveal-banner { opacity: 1; transform: translateX(50%) scaleX(1); }
        @keyframes flyAwayOut { 0% { transform: translate(0, 0) rotate(0deg) scale(1); } 100% { transform: translate(100vw, -100vh) rotate(-20deg) scale(0.5); } }

        /* --- MAIN APP SECTION --- */
        #main-content { background-color: var(--bg-cream); min-height: 100vh; display: none; opacity: 0; transition: opacity 0.8s ease; }
        
        /* --- HERO SECTION --- */
        .hero {
            position: relative; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 24px;
            background: linear-gradient(rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.42)), url('wedding_bg_desktop.jpg') no-repeat center top/contain;
            background-color: var(--pastel-pink-dark);
            max-width: 800px; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.08);
        }

        @media(max-width: 768px) {
            .hero {
                background: linear-gradient(rgba(0, 0, 0, 0.38), rgba(0, 0, 0, 0.38)), url('wedding_bg_mobile.jpg') no-repeat center center/cover;
                max-width: 100%; box-shadow: none;
            }
        }

        .hero-hashtag { font-family: 'Alex Brush', cursive; font-size: 3.5rem; margin-bottom: 10px; text-shadow: 0 2px 8px rgba(0,0,0,0.45); }
        .hero-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 3px; margin: 12px 0; font-weight: 400; text-shadow: 0 2px 8px rgba(0,0,0,0.45); }
        .hero-details { font-size: 0.95rem; margin: 8px 0; font-weight: 300; letter-spacing: 1px; text-shadow: 0 1px 5px rgba(0,0,0,0.45); }

        .btn-confirm { margin-top: 30px; background-color: transparent; color: white; border: 1px solid white; padding: 12px 30px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; text-decoration: none; transition: background 0.3s; -webkit-tap-highlight-color: transparent; }
        .btn-confirm:hover { background-color: white; color: var(--text-dark); }

        /* --- RSVP SECTION --- */
        .rsvp-container { 
            padding: 60px 20px; 
            max-width: 480px; 
            margin: 0 auto; 
            text-align: center; 
            color: var(--text-dark);
            background-color: var(--bg-cream);
        }
        .rsvp-meta-header { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #776666; margin-bottom: 6px; }
        .rsvp-deadline { color: var(--accent-maroon); font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.15rem; margin-bottom: 35px; }
        .rsvp-header-main { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 400; margin-bottom: 35px; }

        .form-group { margin-bottom: 30px; text-align: left; }
        .form-group label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #4e3f42; margin-bottom: 10px; font-weight: 600; }
        
        .form-group input[type="text"], .form-group input[type="tel"], .form-group select {
            width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #dcd0d2; background: transparent; font-size: 1rem; font-family: inherit; outline: none; color: var(--text-dark); border-radius: 0; -webkit-appearance: none;
        }

        .form-group select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z' fill='%23222'/></svg>");
            background-repeat: no-repeat; background-position: right center; padding-right: 20px;
        }

        .radio-container { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
        .radio-label { display: flex; align-items: center; gap: 10px; font-size: 0.95rem; cursor: pointer; line-height: 1.4; -webkit-tap-highlight-color: transparent; }
        .radio-label input { accent-color: var(--accent-maroon); width: 22px; height: 22px; flex-shrink: 0; }

        .submit-btn { background-color: var(--accent-maroon); color: white; border: none; width: 100%; padding: 16px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 15px; border-radius: 4px; box-shadow: 0 4px 10px rgba(107,45,92,0.15); -webkit-tap-highlight-color: transparent; }
        .submit-btn:hover { background-color: #542248; }
        .footer-hashtag { margin-top: 60px; font-family: 'Alex Brush', cursive; font-size: 2.5rem; color: var(--gold-muted); }

        /* --- MOBILE SPECIFIC --- */
        @media(max-width: 480px) {
            .hero-hashtag { font-size: 2.8rem; }
            .hero-title { font-size: 1.4rem; letter-spacing: 2px; }
            .hero-details { font-size: 0.85rem; }
            .rsvp-header-main { font-size: 1.6rem; }
            .airplane-svg { width: 150px; }
            .reveal-banner { font-size: 1.5rem; padding: 6px 18px; }
            .lang-container { top: 12px; right: 12px; padding: 6px 12px; }
        }
    </style>
</head>
<body>

    <div class="lang-container">
        <button class="lang-btn active" onclick="switchLanguage('en', event)">English</button>
        <span class="lang-divider">|</span>
        <button class="lang-btn" onclick="switchLanguage('hi', event)">हिन्दी</button>
        <span class="lang-divider">|</span>
        <button class="lang-btn" onclick="switchLanguage('gu', event)">ગુજરાતી</button>
    </div>

    <div id="intro-screen">
        <div class="cloud c1"></div><div class="cloud c2"></div>
        <div class="flight-container" id="flightContainer">
            <div class="reveal-banner">#CharviSaidYash</div>
            <svg class="airplane-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
            </svg>
            <div class="takeoff-banner" id="trans-takeoffBanner">Charvi taking off with Yash</div>
        </div>
        <div class="launch-text" id="trans-launchText">Tap To Launch</div>
    </div>

    <main id="main-content">
        <section class="hero">
            <div class="hero-hashtag">#CharviSaidYash</div>
            <h1 class="hero-title" id="trans-hero
