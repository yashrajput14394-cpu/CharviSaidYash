<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Charvi & Yash Wedding 🎉</title>
    
    <meta property="og:title" content="Wedding of Charvi & Yash" />
    <meta property="og:description" content="We are taking off! Tap to watch our airplane takeoff and RSVP to confirm your presence. ✈️💍" />
    <meta property="og:image" content="https://yashrajput14394-cpu.github.io/CharviSaidYash/wedding_bg_mobile.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yashrajput14394-cpu.github.io/CharviSaidYash/" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-sky: #fae0e4;
            --bg-cream: #fae0e4;
            --pastel-pink-dark: #fae0e4;
            --text-dark: #2c2525;
            --accent-maroon: #6b2d5c;
            --gold-muted: #d4a373;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-sky); font-family: 'Montserrat', sans-serif; overflow-x: hidden; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

        .lang-container {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: #ffffff; padding: 8px 16px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            display: flex; gap: 10px; font-size: 0.8rem; font-weight: 600;
            border: 1px solid var(--accent-maroon); align-items: center;
        }
        .lang-btn {
            color: #665555; text-decoration: none; transition: color 0.3s, transform 0.2s;
            font-family: inherit; font-size: inherit; padding: 2px 4px; -webkit-tap-highlight-color: transparent;
        }
        .lang-btn:hover, .lang-btn.active { color: var(--accent-maroon); transform: scale(1.05); }
        .lang-divider { color: #e0d0d0; font-weight: 300; }

        .audio-toggle-btn {
            position: fixed; bottom: 25px; right: 25px; z-index: 9998;
            background: #ffffff; border: 1px solid var(--accent-maroon);
            color: var(--accent-maroon); width: 45px; height: 45px; border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: none; align-items: center;
            justify-content: center; cursor: pointer; font-size: 1.2rem; transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-sky); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            overflow: hidden; opacity: 1; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.4s ease;
        }

        .flight-container { 
            position: relative; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            z-index: 1005; -webkit-tap-highlight-color: transparent; padding: 20px;
            width: 100%; max-width: 350px;
        }
        .airplane-svg { width: 140px; height: auto; fill: var(--accent-maroon); filter: drop-shadow(0 10px 15px rgba(107,45,92,0.15)); margin-bottom: 25px; transition: transform 1.8s cubic-bezier(0.45, 0, 0.55, 1); }
        
        .takeoff-banner {
            background: white; padding: 12px 28px; border-radius: 50px;
            font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; color: var(--accent-maroon);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); white-space: nowrap; border: 1px solid rgba(107,45,92,0.1);
            text-align: center; width: 100%; transition: opacity 0.3s ease;
        }

        .reveal-banner {
            position: absolute; top: -25px; background: white; padding: 10px 30px; border: 2.5px dashed var(--accent-maroon);
            font-family: 'Alex Brush', cursive; font-size: 2.3rem; font-weight: bold; color: var(--accent-maroon);
            white-space: nowrap; opacity: 0; transform: scale(0.5); transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease; z-index: 1006;
            box-shadow: 0 8px 20px rgba(107,45,92,0.15);
        }

        .launch-text { color: #8a7578; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px; margin-top: 25px; text-align: center; transition: opacity 0.3s ease; }

        .flight-container.takeoff .takeoff-banner, .flight-container.takeoff .launch-text { opacity: 0; }
        .flight-container.takeoff .reveal-banner { opacity: 1; transform: scale(1); }
        .flight-container.takeoff .airplane-svg { animation: delayedFlyAway 1.8s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards; }

        @keyframes delayedFlyAway { 
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            15% { transform: translate(-2px, 5px) rotate(-3deg) scale(1); }
            40% { transform: translate(20px, -40px) rotate(-12deg) scale(0.95); }
            100% { transform: translate(120vw, -120vh) rotate(-22deg) scale(0.2); } 
        }

        #main-content { background-color: var(--bg-cream); min-height: 100vh; display: block; }
        
        .hero-first {
            position: relative; height: 100vh; width: 100%;
            background: url('wedding_bg_desktop.jpg') no-repeat center top/contain;
            background-color: var(--pastel-pink-dark);
            max-width: 800px; margin: 0 auto;
        }

        @media(max-width: 768px) {
            .hero-first { background: url('wedding_bg_mobile.jpg') no-repeat center center/cover; max-width: 100%; }
        }

        .scroll-prompt {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;
            opacity: 0.8; pointer-events: none; text-shadow: 0 2px 5px rgba(0,0,0,0.6);
            animation: pulseArrow 2s infinite; z-index: 10;
        }
        @keyframes pulseArrow { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, 8px); } }

        .rsvp-container { padding: 80px 20px 60px 20px; max-width: 480px; margin: 0 auto; text-align: center; color: var(--text-dark); background-color: var(--bg-cream); }
        
        .hero-hashtag { font-family: 'Alex Brush', cursive; font-size: 3.5rem; margin-bottom: 12px; color: var(--accent-maroon); }
        .hero-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 3px; margin: 15px 0; font-weight: 400; color: var(--text-dark); }
        .hero-details { font-size: 1.1rem; font-weight: 600; letter-spacing: 1px; color: var(--accent-maroon); line-height: 1.6; margin: 20px 0 40px 0; }

        .rsvp-deadline { color: var(--accent-maroon); font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.15rem; margin-top: 20px; margin-bottom: 35px; }
        .rsvp-header-main { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 35px; border-top: 1px dashed #dcd0d2; padding-top: 35px; color: var(--text-dark); }

        .form-group { margin-bottom: 30px; text-align: left; }
        .form-group label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #4e3f42; margin-bottom: 10px; font-weight: 600; }
