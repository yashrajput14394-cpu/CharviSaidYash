<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Charvi & Yash Wedding 🎉</title>
    
    <meta property="og:title" content=" Wedding of Charvi & Yash" />
    <meta property="og:description" content="We are taking off! Tap to watch our airplane takeoff and RSVP to confirm your presence. ✈️💍" />
    <meta property="og:image" content="https://yashrajput14394-cpu.github.io/CharviSaidYash/wedding_bg_mobile.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yashrajput14394-cpu.github.io/CharviSaidYash/" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-sky: #fae0e4;
            --bg-cream: #fae0e4;
            --text-dark: #2c2525;
            --accent-maroon: #6b2d5c;
            --gold-muted: #d4a373;
            --pastel-pink-dark: #f7cad0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-sky); font-family: 'Montserrat', sans-serif; overflow-x: hidden; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

        /* --- FIXED LANGUAGE SWITCHER --- */
        .lang-container {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: #ffffff; padding: 8px 16px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            display: flex; gap: 10px; font-size: 0.8rem; font-weight: 600;
            border: 1px solid var(--accent-maroon); align-items: center;
        }
        .lang-btn {
            color: #665555; cursor: pointer; transition: color 0.3s, transform 0.2s;
            background: none; border: none; font-family: inherit; font-size: inherit; outline: none;
            padding: 2px 4px; -webkit-tap-highlight-color: transparent;
        }
        .lang-btn:hover, .lang-btn.active { color: var(--accent-maroon); transform: scale(1.05); }
        .lang-divider { color: #e0d0d0; font-weight: 300; }

        /* --- STABLE INTRO SCREEN --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-sky); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            overflow: hidden; visibility: visible; opacity: 1;
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
        }

        .flight-container { 
            position: relative; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            z-index: 1005; -webkit-tap-highlight-color: transparent; padding: 20px;
            width: 100%; max-width: 320px;
        }
        .airplane-svg { width: 140px; height: auto; fill: var(--accent-maroon); filter: drop-shadow(0 10px 15px rgba(107,45,92,0.15)); margin-bottom: 25px; }
        
        .takeoff-banner {
            background: white; padding: 12px 28px; border-radius: 50px;
            font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; color: var(--accent-maroon);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); white-space: nowrap; border: 1px solid rgba(107,45,92,0.1);
            text-align: center; width: 100%;
        }

        .launch-text { color: #8a7578; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px; margin-top: 25px; text-align: center; }

        /* --- MAIN APP SECTION --- */
        #main-content { background-color: var(--bg-cream); min-height: 100vh; display: none; opacity: 0; transition: opacity 0.4s ease; }
        
        /* --- HERO SECTION --- */
        .hero {
            position: relative; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 24px;
            background: linear-gradient(rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.42)), url('wedding_bg_desktop.jpg') no-repeat center top/contain;
            background-color: var(--pastel-pink-dark);
            max-width: 800px; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.08);
        }

        @media(max-width: 768px) {
            .hero {
                background: linear-gradient(rgba(0, 0, 0, 0.38), rgba(0, 0, 0, 0.38)), url('wedding_bg_mobile.jpg') no-repeat center center/cover;
                max-width: 100%; box-shadow: none;
            }
        }

        .hero-hashtag { font-family: 'Alex Brush', cursive; font-size: 3.5rem; margin-bottom: 10px; text-shadow: 0 2px 8px rgba(0,0,0,0.45); }
        .hero-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 3px; margin: 12px 0; font-weight: 400; text-shadow: 0 2px 8px rgba(0,0,0,0.45); }
        .hero-details { font-size: 0.95rem; margin: 8px 0; font-weight: 300; letter-spacing: 1px; text-shadow: 0 1px 5px rgba(0,0,0,0.45); }

        .btn-confirm { margin-top: 30px; background-color: transparent; color: white; border: 1px solid white; padding: 12px 30px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; text-decoration: none; transition: background 0.3s; -webkit-tap-highlight-color: transparent; }
        .btn-confirm:hover { background-color: white; color: var(--text-dark); }

        /* --- RSVP SECTION --- */
        .rsvp-container { 
            padding: 60px 20px; 
            max-width: 480px; 
            margin: 0 auto; 
            text-align: center; 
            color: var(--text-dark);
            background-color: var(--bg-cream);
        }
        .rsvp-meta-header { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #776666; margin-bottom: 6px; }
        .rsvp-deadline { color: var(--accent-maroon); font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.15rem; margin-bottom: 35px; }
        .rsvp-header-main { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 400; margin-bottom: 35px; }

        .form-group { margin-bottom: 30px; text-align: left; }
        .form-group label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #4e3f42; margin-bottom: 10px; font-weight: 600; }
        
        .form-group input[type="text"], .form-group input[type="tel"], .form-group select {
            width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #dcd0d2; background: transparent; font-size: 1rem; font-family: inherit; outline: none; color: var(--text-dark); border-radius: 0; -webkit-appearance: none;
        }

        .form-group select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z' fill='%23222'/></svg>");
            background-repeat: no-repeat; background-position: right center; padding-right: 20px;
        }

        .radio-container { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
        .radio-label { display: flex; align-items: center; gap: 10px; font-size: 0.95rem; cursor: pointer; line-height: 1.4; -webkit-tap-highlight-color: transparent; }
        .radio-label input { accent-color: var(--accent-maroon); width: 22px; height: 22px; flex-shrink: 0; }

        .submit-btn { background-color: var(--accent-maroon); color: white; border: none; width: 100%; padding: 16px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 15px; border-radius: 4px; box-shadow: 0 4px 10px rgba(107,45,92,0.15); -webkit-tap-highlight-color: transparent; }
        .submit-btn:hover { background-color: #542248; }
        .footer-hashtag { margin-top: 60px; font-family: 'Alex Brush', cursive; font-size: 2.5rem; color: var(--gold-muted); }

        /* --- MOBILE SPECIFIC --- */
        @media(max-width: 480px) {
            .hero-hashtag { font-size: 2.8rem; }
            .hero-title { font-size: 1.4rem; letter-spacing: 2px; }
            .hero-details { font-size: 0.85rem; }
            .rsvp-header-main { font-size: 1.6rem; }
            .airplane-svg { width: 120px; }
            .lang-container { top: 12px; right: 12px; padding: 6px 12px; }
        }
    </style>
</head>
<body>

    <div class="lang-container">
        <button class="lang-btn active" onclick="switchLanguage('en', event)">English</button>
        <span class="lang-divider">|</span>
        <button class="lang-btn" onclick="switchLanguage('hi', event)">हिन्दी</button>
        <span class="lang-divider">|</span>
        <button class="lang-btn" onclick="switchLanguage('gu', event)">ગુજરાતી</button>
    </div>

    <div id="intro-screen" onclick="displayMainApp()">
        <div class="flight-container">
            <svg class="airplane-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
            </svg>
            <div class="takeoff-banner" id="trans-takeoffBanner">Charvi taking off with Yash</div>
            <div class="launch-text" id="trans-launchText">Tap Anywhere To Open</div>
        </div>
    </div>

    <main id="main-content">
        <section class="hero">
            <div class="hero-hashtag">#CharviSaidYash</div>
            <h1 class="hero-title" id="trans-heroTitle">Wedding of Charvi & Yash</h1>
            <p class="hero-details" id="trans-heroDetails1">5 – 6 December 2026 &bull; Surat, Gujarat, India</p>
            <p class="hero-details" id="trans-heroDetails2" style="color: #fae0e4; font-size: 0.85rem; line-height: 1.6;">5th: Haldi, Mehendi & Sangeet <br> 6th: Wedding</p>
            <a href="#rsvpFormSection" class="btn-confirm" id="trans-btnConfirm">Confirm Attendance</a>
        </section>

        <section id="rsvpFormSection" class="rsvp-container">
            <p class="rsvp-meta-header" id="trans-rsvpMeta">Wedding of Charvi & Yash</p>
            <p class="rsvp-deadline" id="trans-rsvpDeadline">RSVP BY 18 November 2026</p>
            <h2 class="rsvp-header-main" id="trans-rsvpMainHeader">Confirm Your Presence</h2>

            <form id="weddingForm">
                <div class="form-group">
                    <label id="trans-labelName" for="guestName">Full Name</label>
                    <input type="text" id="guestName" placeholder="Your name" required>
                </div>

                <div class="form-group">
                    <label id="trans-labelPhone" for="guestPhone">Mobile Number</label>
                    <input type="tel" id="guestPhone" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                </div>

                <div class="form-group">
                    <label id="trans-labelAttending">Will you be attending?</label>
                    <div class="radio-container">
                        <label class="radio-label"><input type="radio" name="attendance" value="Attending" id="attendingRadio" checked> <span id="trans-radioYes">Super Excited To Be There! 🎉</span></label>
                        <label class="radio-label"><input type="radio" name="attendance" value="Not Attending" id="notAttendingRadio"> <span id="trans-radioNo">Regretfully, I won't be able to join 😔</span></label>
                    </div>
                </div>

                <div class="form-group" id="travelGroup">
                    <label id="trans-labelTravel" for="travelMode">How are you travelling to Surat?</label>
                    <select id="travelMode">
                        <option value="Not Specified" id="trans-optDefault">Select Mode of Transport</option>
                        <option value="Airways" id="trans-optAir">Airways ✈️</option>
                        <option value="Railways" id="trans-optRail">Railways 🚂</option>
                        <option value="Roadways" id="trans-optRoad">Roadways 🚗</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Confirm Attendance</button>
            </form>
            <div class="footer-hashtag">#CharviSaidYash</div>
        </section>
    </main>

    <script>
        const translations = {
            en: {
                takeoffBanner: "Charvi taking off with Yash",
                launchText: "Tap Anywhere To Open",
                heroTitle: "Wedding of Charvi & Yash",
                heroDetails1: "5 – 6 December 2026 • Surat, Gujarat, India",
                heroDetails2: "5th: Haldi, Mehendi & Sangeet <br> 6th: Wedding",
                btnConfirm: "Confirm Attendance",
                rsvpMeta: "Wedding of Charvi & Yash",
                rsvpDeadline: "RSVP BY 18 November 2026",
                rsvpMainHeader: "Confirm Your Presence",
                labelName: "Full Name",
                placeholderName: "Your name",
                labelPhone: "Mobile Number",
                placeholderPhone: "10-digit mobile number",
                labelAttending: "Will you be attending?",
                radioYes: "Super Excited To Be There! 🎉",
                radioNo: "Regretfully, I won't be able to join 😔",
                labelTravel: "How are you travelling to Surat?",
                optDefault: "Select Mode of Transport",
                optAir: "Airways ✈️",
                optRail: "Railways 🚂",
                optRoad: "Roadways 🚗",
                btnSubmit: "Confirm Attendance",
                sending: "Sending...",
                thankYou: "Thank You!",
                alertMessage: "We are excited to welcome you! 🎉",
                alertError: "Error submitting form. Please try again."
            },
            hi: {
                takeoffBanner: "चार्वी चली यश के साथ उड़ान भरने",
                launchText: "खोलने के लिए कहीं भी टैप करें",
                heroTitle: "चार्वी और यश का विवाह",
                heroDetails1: "5 – 6 दिसंबर 2026 • सूरत, गुजरात, भारत",
                heroDetails2: "5 तारीख: हल्दी, मेहंदी और संगीत <br> 6 तारीख: शादी",
                btnConfirm: "उपस्थिति की पुष्टि करें",
                rsvpMeta: "चार्वी और यश का विवाह",
                rsvpDeadline: "RSVP की अंतिम तिथि 18 नवंबर 2026",
                rsvpMainHeader: "अपनी उपस्थिति दर्ज करें",
                labelName: "पूरा नाम",
                placeholderName: "आपका नाम",
                labelPhone: "मोबाइल नंबर",
                placeholderPhone: "10 अंकों का मोबाइल नंबर",
                labelAttending: "क्या आप शादी में शामिल होंगे?",
                radioYes: "आने के लिए बेहद उत्साहित हूँ! 🎉",
                radioNo: "खेद है, मैं शामिल नहीं हो पाऊँगा/पाऊँगी 😔",
                labelTravel: "आप सूरत कैसे आ रहे हैं?",
                optDefault: "यात्रा का साधन चुनें",
                optAir: "हवाई यात्रा ✈️",
                optRail: "रेल यात्रा 🚂",
                optRoad: "सड़क मार्ग 🚗",
                btnSubmit: "उपस्थिति की पुष्टि करें",
                sending: "भेजा जा रहा है...",
                thankYou: "धन्यवाद!",
                alertMessage: "हम आपका स्वागत करने के लिए उत्साहित हैं! 🎉",
                alertError: "सबमिट करने में त्रुटि। कृपया पुनः प्रयास करें।"
            },
            gu: {
                takeoffBanner: "ચાર્વી ચાલી યશ સાથે ઉડાન ભરવા",
                launchText: "ખોલવા માટે ગમે ત્યાં ટેપ કરો",
                heroTitle: "ચાર્વી અને યશ ના લગ્ન",
                heroDetails1: "5 – 6 ડિસેમ્બર 2026 • સુરત, ગુજરાત, ભારત",
                heroDetails2: "5મી: હલ્દી, મહેંદી અને સંગીત <br> 6ઠ્ઠી: લગ્ન",
                btnConfirm: "હાજરીની ખાતરી કરો",
                rsvpMeta: "ચાર્વી અને યશ ના લગ્ન",
                rsvpDeadline: "RSVP ની છેલ્લી તારીખ 18 નવેમ્બર 2026",
                rsvpMainHeader: "તમારી હાજરી નોંધાવો",
                labelName: "પૂરું નામ",
                placeholderName: "તમારું નામ",
                labelPhone: "મોબાઇલ નંબર",
                placeholderPhone: "10 અંકનો મોબાઇલ નંબર",
                labelAttending: "શું તમે લગ્નમાં હાજરી આપશો?",
                radioYes: "આવવા માટે ખૂબ જ ઉદાસીન/ઉત્સાહિત છું! 🎉",
                radioNo: "દિલગીરી સાથે, હું હાજર નહીં રહી શકું 😔",
                labelTravel: "તમે સુરત કેવી રીતે આવી રહ્યા છો?",
                optDefault: "મુસાફરીનું માધ્યમ પસંદ કરો",
                optAir: "હવાઈ માર્ગ ✈️",
                optRail: "રેલવે માર્ગ 🚂",
                optRoad: "રોડ માર્ગ 🚗",
                btnSubmit: "હાજરીની ખાતરી કરો",
                sending: "મોકલી રહ્યું છે...",
                thankYou: "ધન્યવાદ!",
                alertMessage: "અમે તમારું સ્વાગત કરવા માટે ઉત્સાહિત છીએ! 🎉",
                alertError: "સબમિટ કરવામાં ભૂલ આવી. કૃપા કરીને ફરી પ્રયાસ કરો."
            }
        };

        let currentLang = 'en';

        function switchLanguage(lang, event) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            if(event && event.target) event.target.classList.add('active');

            document.getElementById('trans-takeoffBanner').innerText = translations[lang].takeoffBanner;
            document.getElementById('trans-launchText').innerText = translations[lang].launchText;
            document.getElementById('trans-heroTitle').innerText = translations[lang].heroTitle;
            document.getElementById('trans-heroDetails1').innerHTML = translations[lang].heroDetails1;
            document.getElementById('trans-heroDetails2').innerHTML = translations[lang].heroDetails2;
            document.getElementById('trans-btnConfirm').innerText = translations[lang].btnConfirm;
            document.getElementById('trans-rsvpMeta').innerText = translations[lang].rsvpMeta;
            document.getElementById('trans-rsvpDeadline').innerText = translations[lang].rsvpDeadline;
            document.getElementById('trans-rsvpMainHeader').innerText = translations[lang].rsvpMainHeader;
            document.getElementById('trans-labelName').innerText = translations[lang].labelName;
            document.getElementById('guestName').placeholder = translations[lang].placeholderName;
            document.getElementById('trans-labelPhone').innerText = translations[lang].labelPhone;
            document.getElementById('guestPhone').placeholder = translations[lang].placeholderPhone;
            document.getElementById('trans-labelAttending').innerText = translations[lang].labelAttending;
            document.getElementById('trans-radioYes').innerText = translations[lang].radioYes;
            document.getElementById('trans-radioNo').innerText = translations[lang].radioNo;
            document.getElementById('trans-labelTravel').innerText = translations[lang].labelTravel;
            document.getElementById('trans-optDefault').innerText = translations[lang].optDefault;
            document.getElementById('trans-optAir').innerText = translations[lang].optAir;
            document.getElementById('trans-optRail').innerText = translations[lang].optRail;
            document.getElementById('trans-optRoad').innerText = translations[lang].optRoad;
            
            const submitBtn = document.getElementById('submitBtn');
            if (!submitBtn.disabled) submitBtn.innerText = translations[lang].btnSubmit;
        }

        const introScreen = document.getElementById('intro-screen');
        const mainContent = document.getElementById('main-content');
        const travelGroup = document.getElementById('travelGroup');
        const notAttendingRadio = document.getElementById('notAttendingRadio');
        const attendingRadio = document.getElementById('attendingRadio');
        let appLaunched = false;

        function displayMainApp() {
            if (appLaunched) return;
            appLaunched = true;
            
            // Hard hide layout shifts instantly
            introScreen.style.transform = 'translateY(-100vh)';
            introScreen.style.opacity = '0';
            mainContent.style.display = 'block';
            document.body.style.overflowY = 'auto';
            
            setTimeout(() => {
                mainContent.style.opacity = '1';
                introScreen.style.display = 'none';
            }, 300);
        }

        // Global recovery timer: If anything blocks structural setup, force auto-reveal in 2 seconds
        setTimeout(() => {
            if(!appLaunched) displayMainApp();
        }, 2000);

        notAttendingRadio.addEventListener('change', () => { if(notAttendingRadio.checked) travelGroup.style.display = 'none'; });
        attendingRadio.addEventListener('change', () => { if(attendingRadio.checked) travelGroup.style.display = 'block'; });

        const form = document.getElementById('weddingForm');
        const submitBtn = document.getElementById('submitBtn');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxdqEZbF_nDhLb0JfKL4nVNuOxatWzQPqTSmXIqmRaWTWrTnbOWyAJk5C6CYAR3ZgpcaQ/exec';

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = translations[currentLang].sending;

            const formData = new FormData();
            formData.append('guestName', document.getElementById('guestName').value);
            formData.append('guestPhone', document.getElementById('guestPhone').value);
            formData.append('attendance', document.querySelector('input[name="attendance"]:checked').value);
            
            const travelSelection = notAttendingRadio.checked ? "N/A" : document.getElementById('travelMode').value;
            formData.append('travelMode', travelSelection);

            fetch(scriptURL, { method: 'POST', body: formData})
                .then(response => {
                    submitBtn.innerText = translations[currentLang].thankYou;
                    alert(translations[currentLang].alertMessage);
                    form.reset();
                    travelGroup.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerText = translations[currentLang].btnSubmit;
                })
                .catch(error => {
                    submitBtn.disabled = false;
                    submitBtn.innerText = translations[currentLang].btnSubmit;
                    alert(translations[currentLang].alertError);
                });
        });
    </script>
</body>
</html>
